<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Article to PDF Extractor">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Decorative bookmark icon on right -->
  <g transform="translate(900, 50)" opacity="0.95">
    <!-- Browser window -->
    <rect x="0" y="0" width="240" height="180" rx="8" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- Window controls -->
    <circle cx="16" cy="14" r="3.5" fill="#ff5f57" opacity="0.9"/>
    <circle cx="28" cy="14" r="3.5" fill="#febc2e" opacity="0.9"/>
    <circle cx="40" cy="14" r="3.5" fill="#28c840" opacity="0.9"/>
    <!-- Address bar -->
    <rect x="55" y="8" width="170" height="12" rx="3" fill="#ffffff" fill-opacity="0.15"/>
    <!-- Content lines -->
    <rect x="20" y="42" width="200" height="6" rx="2" fill="#ffffff" fill-opacity="0.7"/>
    <rect x="20" y="56" width="160" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="20" y="66" width="180" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="20" y="76" width="150" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="20" y="86" width="190" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="20" y="96" width="170" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="20" y="106" width="180" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="20" y="116" width="140" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="20" y="126" width="170" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>
    <!-- Bookmark ribbon -->
    <g transform="translate(180, -8)" filter="url(#shadow)">
      <path d="M 0 0 L 40 0 L 40 56 L 20 44 L 0 56 Z" fill="url(#accent)"/>
      <text x="20" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">📎</text>
    </g>
  </g>

  <!-- Arrow / flow indicator -->
  <g transform="translate(820, 138)" opacity="0.6">
    <path d="M 0 0 L 50 0 M 40 -6 L 50 0 L 40 6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- PDF icon on far left -->
  <g transform="translate(80, 80)" opacity="0.95">
    <path d="M 0 0 L 80 0 L 110 30 L 110 140 L 0 140 Z" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
    <path d="M 80 0 L 80 30 L 110 30" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="55" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0.9">PDF</text>
  </g>

  <!-- Title block -->
  <g transform="translate(240, 110)">
    <text x="0" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="46" font-weight="300" fill="#ffffff">Article to PDF</text>
    <text x="0" y="50" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="46" font-weight="700" fill="#ffffff">Extractor</text>
    <text x="0" y="92" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="400" fill="#ffffff" opacity="0.85">Convert articles to clean PDFs — paywalls included.</text>
    <text x="0" y="116" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="400" fill="#ffffff" opacity="0.7">No credentials. No backend. Just your browser.</text>
  </g>
</svg>
